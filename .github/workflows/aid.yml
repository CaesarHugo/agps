
name: Bygg A-GPS-data

on:
  schedule:
    - cron: "7 * * * *"     # 7 minuter over varje hel timme
  workflow_dispatch:         # gor att du kan kora den manuellt ocksa

permissions:
  contents: write

jobs:
  bygg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Hamta RINEX och bygg aid.ubx
        run: python3 rinex_till_ubx.py

      - name: Committa om filen andrats
        run: |
          git config user.name "agps-bot"
          git config user.email "agps-bot@users.noreply.github.com"
          git add aid.ubx
          if git diff --cached --quiet; then
            echo "Ingen andring."
          else
            git commit -m "Uppdaterad A-GPS-data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
